<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVIE Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .admin-section {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid var(--primary);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.4);
        }
        
        .admin-section h2 {
            color: var(--gold);
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .add-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .add-form input {
            flex: 1;
            padding: 12px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(0, 240, 255, 0.5);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
        }
        
        .add-form button {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        
        .list-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
        }
        
        .list-item {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .list-item span {
            color: var(--text);
            font-size: 14px;
        }
        
        .delete-btn {
            background: var(--danger);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .delete-btn:hover {
            background: #dc2626;
        }
        
        .logout-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: var(--danger);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            z-index: 1000;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(123, 47, 247, 0.2));
            border: 2px solid var(--primary);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: var(--gold);
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: var(--text-dim);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <script src="api-config.js"></script>
    <div class="background-animation"></div>
    
    <button class="logout-btn" onclick="logout()">Đăng Xuất</button>
    
    <button class="logout-btn" onclick="window.location.href='bot-config.html'" style="right: 260px; background: var(--secondary);">🤖 Cấu Hình Bot</button>
    
    <button class="logout-btn" onclick="window.location.href='settings.html'" style="right: 140px; background: var(--primary);">⚙️ Cài Đặt</button>
    
    <div class="admin-container">
        <div style="text-align: center; margin: 40px 0;">
            <h1 style="font-size: 48px; background: linear-gradient(135deg, var(--gold), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                EVIE Admin Panel
            </h1>
            <p style="color: var(--text-dim);">
                Xin chào, <strong id="username" style="color: var(--primary);"></strong>! 
                Quản lý danh sách của bạn
            </p>
        </div>
        
        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="websiteCount">0</div>
                <div class="stat-label">Websites</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="accountCount">0</div>
                <div class="stat-label">Tài Khoản</div>
            </div>
        </div>
        
        <!-- Websites Management -->
        <div class="admin-section">
            <h2>🌐 Quản Lý Websites</h2>
            <div class="add-form">
                <input type="text" id="websiteInput" placeholder="Nhập domain (vd: ok168.pro)">
                <button onclick="addWebsite()">Thêm Website</button>
            </div>
            <div class="list-container" id="websiteList"></div>
        </div>
        
        <!-- Accounts Management -->
        <div class="admin-section">
            <h2>👤 Quản Lý Tài Khoản</h2>
            <div class="add-form">
                <input type="text" id="accountInput" placeholder="Nhập tên tài khoản">
                <button onclick="addAccount()">Thêm Tài Khoản</button>
            </div>
            <div class="list-container" id="accountList"></div>
        </div>
    </div>
    
    <script>
        // API_URL is defined in api-config.js
        let apiKey = localStorage.getItem('adminApiKey');
        const username = localStorage.getItem('adminUsername');
        
        // Check if logged in
        if (!apiKey) {
            window.location.href = 'login.html';
        }
        
        // Verify API key is still valid
        async function verifyApiKey() {
            try {
                const response = await fetch(`${API_URL}/websites`, {
                    headers: { 'X-API-Key': apiKey }
                });
                
                if (!response.ok) {
                    console.log('API key invalid or expired, status:', response.status);
                    const errorData = await response.json();
                    console.log('Error:', errorData);
                    
                    // Only redirect if it's actually an auth error
                    if (response.status === 401) {
                        alert('Phiên đăng nhập đã hết hạn. Vui lòng đăng nhập lại.');
                        localStorage.clear();
                        window.location.href = 'login.html';
                    }
                    return false;
                }
                return true;
            } catch (error) {
                console.error('Error verifying API key:', error);
                // Don't redirect on network errors, just show error
                showNotification('⚠ Lỗi kết nối server', 'danger');
                return false;
            }
        }
        
        // Verify on page load
        verifyApiKey().then(valid => {
            if (valid) {
                loadWebsites();
                loadAccounts();
            }
        });
        
        // Display username
        document.getElementById('username').textContent = username || 'User';
        
        async function loadWebsites() {
            try {
                const response = await fetch(`${API_URL}/websites`, {
                    headers: { 'X-API-Key': apiKey }
                });
                
                if (!response.ok) {
                    if (response.status === 401) {
                        localStorage.clear();
                        window.location.href = 'login.html';
                        return;
                    }
                    throw new Error('Failed to load websites');
                }
                
                const data = await response.json();
                const list = document.getElementById('websiteList');
                list.innerHTML = '';
                
                data.websites.forEach(website => {
                    const item = document.createElement('div');
                    item.className = 'list-item';
                    item.innerHTML = `
                        <span>${website}</span>
                        <button class="delete-btn" onclick="deleteWebsite('${website}')">Xóa</button>
                    `;
                    list.appendChild(item);
                });
                
                document.getElementById('websiteCount').textContent = data.websites.length;
            } catch (error) {
                console.error('Error loading websites:', error);
                showNotification('⚠ Lỗi tải dữ liệu', 'danger');
            }
        }
        
        async function loadAccounts() {
            try {
                const response = await fetch(`${API_URL}/accounts`, {
                    headers: { 'X-API-Key': apiKey }
                });
                
                if (!response.ok) {
                    if (response.status === 401) {
                        localStorage.clear();
                        window.location.href = 'login.html';
                        return;
                    }
                    throw new Error('Failed to load accounts');
                }
                
                const data = await response.json();
                const list = document.getElementById('accountList');
                list.innerHTML = '';
                
                data.accounts.forEach(account => {
                    const item = document.createElement('div');
                    item.className = 'list-item';
                    item.innerHTML = `
                        <span>${account}</span>
                        <button class="delete-btn" onclick="deleteAccount('${account}')">Xóa</button>
                    `;
                    list.appendChild(item);
                });
                
                document.getElementById('accountCount').textContent = data.accounts.length;
            } catch (error) {
                console.error('Error loading accounts:', error);
                showNotification('⚠ Lỗi tải dữ liệu', 'danger');
            }
        }
        
        async function addWebsite() {
            const input = document.getElementById('websiteInput');
            const domain = input.value.trim();
            
            if (!domain) {
                alert('Vui lòng nhập domain');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/websites`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': apiKey
                    },
                    body: JSON.stringify({ domain })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    input.value = '';
                    loadWebsites();
                    showNotification('✓ Đã thêm website', 'success');
                } else {
                    alert('Lỗi: ' + data.error);
                }
            } catch (error) {
                alert('Lỗi: ' + error.message);
            }
        }
        
        async function deleteWebsite(domain) {
            if (!confirm(`Xóa website: ${domain}?`)) return;
            
            try {
                const response = await fetch(`${API_URL}/websites/${encodeURIComponent(domain)}`, {
                    method: 'DELETE',
                    headers: { 'X-API-Key': apiKey }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    loadWebsites();
                    showNotification('✓ Đã xóa website', 'success');
                }
            } catch (error) {
                alert('Lỗi: ' + error.message);
            }
        }
        
        async function addAccount() {
            const input = document.getElementById('accountInput');
            const account = input.value.trim();
            
            if (!account) {
                alert('Vui lòng nhập tài khoản');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/accounts`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': apiKey
                    },
                    body: JSON.stringify({ account })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    input.value = '';
                    loadAccounts();
                    showNotification('✓ Đã thêm tài khoản', 'success');
                } else {
                    alert('Lỗi: ' + data.error);
                }
            } catch (error) {
                alert('Lỗi: ' + error.message);
            }
        }
        
        async function deleteAccount(account) {
            if (!confirm(`Xóa tài khoản: ${account}?`)) return;
            
            try {
                const response = await fetch(`${API_URL}/accounts/${encodeURIComponent(account)}`, {
                    method: 'DELETE',
                    headers: { 'X-API-Key': apiKey }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    loadAccounts();
                    showNotification('✓ Đã xóa tài khoản', 'success');
                }
            } catch (error) {
                alert('Lỗi: ' + error.message);
            }
        }
        
        function logout() {
            localStorage.removeItem('adminApiKey');
            window.location.href = 'login.html';
        }
        
        function showNotification(message, type) {
            const notification = document.createElement('div');
            const bgColor = type === 'success' ? 'var(--success)' : 'var(--danger)';
            
            notification.style.cssText = `
                position: fixed;
                top: 80px;
                right: 20px;
                padding: 15px 25px;
                background: ${bgColor};
                color: white;
                border-radius: 10px;
                box-shadow: 0 5px 20px rgba(0,0,0,0.3);
                z-index: 10000;
                font-weight: 600;
                animation: slideInRight 0.3s ease-out;
            `;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOutRight 0.3s ease-out';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }
        
        // Enter key support
        document.getElementById('websiteInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addWebsite();
        });
        
        document.getElementById('accountInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addAccount();
        });
    </script>
</body>
</html>
