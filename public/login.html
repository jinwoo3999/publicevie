<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVIE Admin Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-box {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid var(--primary);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 0 60px rgba(0, 240, 255, 0.5);
            animation: neon-border 4s linear infinite;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            font-size: 36px;
            background: linear-gradient(135deg, var(--gold), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: var(--text-dim);
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: var(--text);
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(0, 240, 255, 0.5);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 240, 255, 0.5);
        }
        
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>EVIE</h1>
                <p>Admin Login</p>
            </div>
            
            <div class="error-message" id="errorMessage"></div>
            
            <form onsubmit="login(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="admin" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">Đăng Nhập</button>
            </form>
            
            <div class="back-link">
                <a href="index.html">← Quay lại trang chính</a>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://evie-system.vercel.app/api';
        
        async function login(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMessage = document.getElementById('errorMessage');
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Đang đăng nhập...';
            errorMessage.style.display = 'none';
            
            try {
                console.log('Attempting login to:', API_URL);
                
                // Login to get JWT
                const loginResponse = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                console.log('Login response status:', loginResponse.status);
                
                if (!loginResponse.ok) {
                    const errorText = await loginResponse.text();
                    console.error('Login failed:', errorText);
                    throw new Error(`Server error: ${loginResponse.status} - ${errorText.substring(0, 100)}`);
                }
                
                const loginData = await loginResponse.json();
                console.log('Login data:', loginData);
                
                if (!loginData.success) {
                    throw new Error(loginData.error || 'Đăng nhập thất bại');
                }
                
                // Generate API key
                console.log('Generating API key...');
                const keyResponse = await fetch(`${API_URL}/auth/generate-key`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${loginData.token}`
                    }
                });
                
                console.log('API key response status:', keyResponse.status);
                
                if (!keyResponse.ok) {
                    const errorText = await keyResponse.text();
                    console.error('API key generation failed:', errorText);
                    throw new Error(`Không thể tạo API key: ${keyResponse.status}`);
                }
                
                const keyData = await keyResponse.json();
                console.log('API key generated successfully');
                
                if (!keyData.success) {
                    throw new Error('Không thể tạo API key');
                }
                
                // Save API key and token
                localStorage.setItem('adminApiKey', keyData.apiKey);
                localStorage.setItem('adminToken', loginData.token);
                localStorage.setItem('adminUsername', username);
                localStorage.setItem('adminRole', loginData.user.role);
                
                console.log('Redirecting to panel...');
                
                // Redirect based on role
                if (loginData.user.role === 'admin') {
                    window.location.href = 'superadmin.html';
                } else {
                    window.location.href = 'admin.html';
                }
                
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = error.message;
                errorMessage.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Đăng Nhập';
            }
        }
    </script>
</body>
</html>
