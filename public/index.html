<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVIE - Hệ Thống Bảo Mật</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #0f0;
            overflow: hidden;
        }
        
        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.15;
        }
        
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .terminal-box {
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #0f0;
            border-radius: 10px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.5), inset 0 0 30px rgba(0, 255, 0, 0.1);
            animation: borderPulse 2s infinite;
        }
        
        @keyframes borderPulse {
            0%, 100% { box-shadow: 0 0 50px rgba(0, 255, 0, 0.5), inset 0 0 30px rgba(0, 255, 0, 0.1); }
            50% { box-shadow: 0 0 80px rgba(0, 255, 0, 0.8), inset 0 0 50px rgba(0, 255, 0, 0.2); }
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .lock-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: unlockPulse 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px #0f0);
        }
        
        @keyframes unlockPulse {
            0%, 100% { 
                transform: scale(1) rotate(0deg);
                filter: drop-shadow(0 0 20px #0f0);
            }
            25% { 
                transform: scale(1.1) rotate(-5deg);
                filter: drop-shadow(0 0 30px #0f0);
            }
            50% { 
                transform: scale(1.2) rotate(5deg);
                filter: drop-shadow(0 0 40px #0f0);
            }
            75% { 
                transform: scale(1.1) rotate(-5deg);
                filter: drop-shadow(0 0 30px #0f0);
            }
        }
        
        .title {
            font-size: 24px;
            color: #0f0;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #0f0, 0 0 20px #0f0, 0 0 30px #0f0;
            animation: glowPulse 2s ease-in-out infinite;
        }
        
        @keyframes glowPulse {
            0%, 100% { 
                text-shadow: 0 0 10px #0f0, 0 0 20px #0f0, 0 0 30px #0f0;
            }
            50% { 
                text-shadow: 0 0 20px #0f0, 0 0 40px #0f0, 0 0 60px #0f0, 0 0 80px #0f0;
            }
        }
        
        .subtitle {
            font-size: 14px;
            color: #0a0;
            margin-bottom: 30px;
        }
        
        .terminal-info {
            background: rgba(0, 50, 0, 0.3);
            border: 1px solid #0a0;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 30px;
            font-size: 12px;
        }
        
        .terminal-info div {
            margin: 5px 0;
            display: flex;
            align-items: center;
        }
        
        .terminal-info div::before {
            content: '▶';
            margin-right: 10px;
            color: #0f0;
            animation: blink 1s step-end infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #0f0;
            font-size: 14px;
            text-transform: uppercase;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 20, 0, 0.8);
            border: 2px solid #0a0;
            border-radius: 5px;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #0f0;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }
        
        .input-group input::placeholder {
            color: #0a0;
        }
        
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: rgba(0, 50, 0, 0.3);
            border: 2px solid #0a0;
            border-radius: 5px;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        
        .tab-btn:hover {
            background: rgba(0, 100, 0, 0.5);
            border-color: #0f0;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }
        
        .tab-btn.active {
            background: rgba(0, 255, 0, 0.2);
            border-color: #0f0;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
        }
        
        .action-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #0a0, #0f0, #0a0);
            background-size: 200% 200%;
            border: 2px solid #0f0;
            border-radius: 5px;
            color: #000;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
            transition: all 0.3s;
            animation: gradientShift 3s ease infinite;
            position: relative;
            overflow: hidden;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .action-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shine 3s infinite;
        }
        
        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }
        
        .action-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.8), 0 0 100px rgba(0, 255, 0, 0.5);
        }
        
        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .results {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 50, 0, 0.3);
            border: 2px solid #0a0;
            border-radius: 5px;
            display: none;
        }
        
        .results.show {
            display: block;
            animation: slideIn 0.5s;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result-item {
            margin: 10px 0;
            padding: 10px;
            background: rgba(0, 20, 0, 0.5);
            border-left: 3px solid #0f0;
            font-size: 13px;
            animation: slideInLeft 0.5s ease-out;
        }
        
        @keyframes slideInLeft {
            from { 
                opacity: 0; 
                transform: translateX(-50px);
            }
            to { 
                opacity: 1; 
                transform: translateX(0);
            }
        }
        
        .result-success {
            color: #0f0;
            animation: slideInLeft 0.5s ease-out, successPulse 2s ease-in-out infinite;
        }
        
        @keyframes successPulse {
            0%, 100% { 
                box-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
            }
            50% { 
                box-shadow: 0 0 15px rgba(0, 255, 0, 0.6);
            }
        }
        
        .result-danger {
            color: #f00;
            border-left-color: #f00;
        }
        
        .typing-effect {
            overflow: hidden;
            border-right: 2px solid #0f0;
            white-space: nowrap;
            animation: typing 2s steps(40), blink 0.75s step-end infinite;
        }
        
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }
        
        @keyframes blink {
            50% { border-color: transparent; }
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(0, 50, 0, 0.5);
            border-radius: 2px;
            overflow: hidden;
            margin: 20px 0;
            display: none;
        }
        
        .progress-bar.show {
            display: block;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0a0, #0f0);
            width: 0%;
            transition: width 0.3s;
            box-shadow: 0 0 10px #0f0;
        }
        
        .status-text {
            text-align: center;
            color: #0a0;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }
        
        .status-text.show {
            display: block;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #0a0;
        }
        
        .login-link a {
            color: #0f0;
            text-decoration: none;
            font-size: 13px;
            transition: all 0.3s;
        }
        
        .login-link a:hover {
            text-shadow: 0 0 10px #0f0;
        }
    </style>
</head>
<body>
    <canvas id="matrix-bg"></canvas>
    
    <div class="container">
        <div class="terminal-box">
            <div class="header">
                <div class="lock-icon">🔓</div>
                <div class="title">XÓA MÃ ẨN & KÍCH ROOT THÀNH CÔNG</div>
                <div class="subtitle">EVIE Security System v2.0</div>
            </div>
            
            <div class="terminal-info">
                <div>IP Address: 192.168.1.1 [ENCRYPTED]</div>
                <div>Connection: SECURE SSL/TLS</div>
                <div>Status: ROOT ACCESS GRANTED</div>
            </div>
            
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('website')">🌐 WEBSITE</button>
                <button class="tab-btn" onclick="switchTab('account')">👤 TÀI KHOẢN</button>
            </div>
            
            <div id="websiteSection">
                <div class="input-group">
                    <label>▶ NHẬP URL CẦN KIỂM TRA:</label>
                    <input type="text" id="urlInput" placeholder="https://example.com">
                </div>
            </div>
            
            <div id="accountSection" style="display: none;">
                <div class="input-group">
                    <label>▶ NHẬP TÀI KHOẢN:</label>
                    <input type="text" id="accountInput" placeholder="username">
                </div>
            </div>
            
            <button class="action-btn" onclick="startScan()" id="scanBtn">
                ▶ TRUY CẬP VÀO GAME NGAY
            </button>
            
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <div class="status-text" id="statusText">Đang xử lý...</div>
            
            <div class="results" id="results"></div>
            
            <div class="login-link">
                <a href="login.html">🔐 ADMIN LOGIN</a>
            </div>
        </div>
    </div>
    
    <script src="api-config.js"></script>
    <script src="brand-config.js"></script>
    <script>
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#0f0';
            ctx.font = fontSize + 'px monospace';
            
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        
        setInterval(drawMatrix, 35);
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        let currentTab = 'website';
        
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('websiteSection').style.display = tab === 'website' ? 'block' : 'none';
            document.getElementById('accountSection').style.display = tab === 'account' ? 'block' : 'none';
            document.getElementById('results').classList.remove('show');
        }
        
        async function startScan() {
            const input = currentTab === 'website' ? 
                document.getElementById('urlInput').value : 
                document.getElementById('accountInput').value;
            
            if (!input.trim()) {
                showResults('⚠ ERROR: INPUT REQUIRED', false);
                return;
            }
            
            const scanBtn = document.getElementById('scanBtn');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const statusText = document.getElementById('statusText');
            const results = document.getElementById('results');
            
            scanBtn.disabled = true;
            scanBtn.textContent = '⏳ ĐANG XỬ LÝ...';
            progressBar.classList.add('show');
            statusText.classList.add('show');
            results.classList.remove('show');
            
            const steps = [
                'Khởi tạo kết nối...',
                'Phân tích dữ liệu...',
                'Quét mã ẩn...',
                'Kiểm tra bảo mật...',
                'Xóa tracking code...',
                'Hoàn tất!'
            ];
            
            for (let i = 0; i < steps.length; i++) {
                statusText.textContent = `[${i + 1}/${steps.length}] ${steps[i]}`;
                progressFill.style.width = ((i + 1) / steps.length * 100) + '%';
                await sleep(800);
            }
            
            // Call API to check
            let isAllowed = false;
            try {
                // Use API_URL from api-config.js, fallback to auto-detect
                const apiUrl = typeof API_URL !== 'undefined' ? API_URL : 
                    (window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : 'https://evie-system.vercel.app/api');
                
                const endpoint = currentTab === 'website' ? '/public/check-website' : '/public/check-account';
                const body = currentTab === 'website' ? { url: input } : { account: input };
                
                console.log('Calling API:', apiUrl + endpoint);
                
                const response = await fetch(apiUrl + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                const data = await response.json();
                console.log('API response:', data);
                isAllowed = data.isAllowed;
            } catch (error) {
                console.error('API check error:', error);
                // Fallback to config.js if API fails
                isAllowed = checkAllowed(input);
            }
            
            progressBar.classList.remove('show');
            statusText.classList.remove('show');
            scanBtn.disabled = false;
            scanBtn.textContent = '▶ TRUY CẬP VÀO GAME NGAY';
            
            if (isAllowed) {
                const winRate = Math.floor(Math.random() * 21) + 75;
                const minDeposits = Math.floor(Math.random() * 3) + 3;
                const maxDeposits = minDeposits + Math.floor(Math.random() * 3) + 2;
                
                showResults(`
                    <div class="result-item result-success">
                        ✓ ROOT ACCESS: GRANTED
                    </div>
                    <div class="result-item result-success">
                        ✓ HIDDEN CODE: REMOVED
                    </div>
                    <div class="result-item result-success">
                        ✓ TRACKING: DISABLED
                    </div>
                    <div class="result-item result-success">
                        ✓ IP PROTECTION: ENABLED
                    </div>
                    <div class="result-item result-success">
                        📊 TỈ LỆ NỔ: ${winRate}%
                    </div>
                    <div class="result-item result-success">
                        💰 DỰ ĐOÁN: ${minDeposits}-${maxDeposits} lần nạp
                    </div>
                `, true);
            } else {
                showResults(`
                    <div class="result-item result-danger">
                        ✗ ACCESS DENIED
                    </div>
                    <div class="result-item result-danger">
                        ✗ ${currentTab === 'website' ? 'WEBSITE' : 'TÀI KHOẢN'} KHÔNG HỢP LỆ
                    </div>
                    <div class="result-item result-danger">
                        ✗ KHÔNG THỂ XÓA MÃ ẨN
                    </div>
                `, false);
            }
        }
        
        function checkAllowed(value) {
            if (window.CONFIG) {
                if (currentTab === 'website') {
                    const domain = value.toLowerCase().trim()
                        .replace(/^https?:\/\//, '')
                        .replace(/^www\./, '')
                        .replace(/\/.*$/, '');
                    return window.CONFIG.websites.some(allowed => 
                        domain === allowed || domain.endsWith('.' + allowed)
                    );
                } else {
                    return window.CONFIG.accounts.some(allowed => 
                        allowed.toLowerCase() === value.toLowerCase().trim()
                    );
                }
            }
            return false;
        }
        
        function showResults(html, success) {
            const results = document.getElementById('results');
            results.innerHTML = html;
            results.classList.add('show');
        }
        
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startScan();
        });
        
        document.getElementById('accountInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startScan();
        });
    </script>
    <script src="config.js"></script>
</body>
</html>
